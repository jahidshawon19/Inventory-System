<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Inventory System{% endblock %}</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    overflow-x: hidden;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #212529;
    color: white;
    padding-top: 20px;
    position: fixed;
    width: 230px;
}

.sidebar a {
    color: #adb5bd;
    text-decoration: none;
    padding: 12px 20px;
    display: block;
}

.sidebar a:hover,
.sidebar a.active {
    background: #343a40;
    color: white;
}

/* Main content shift */
.main-content {
    margin-left: 230px;
    padding: 20px;
}
</style>

</head>
<body>

<!-- ✅ Top Navbar (Only User Info) -->
<nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-box-seam"></i> Arfaana Inventory
    </span>

    {% if user.is_authenticated %}
    <div class="d-flex align-items-center text-white">

        <!-- User Icon -->
        <i class="bi bi-person-circle fs-4 me-2"></i>

        <!-- Username -->
        <span class="me-3">{{ user.username }}</span>

        <!-- Logout -->
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-sm btn-danger">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </form>

    </div>
    {% endif %}
</nav>


{% if user.is_authenticated %}
<!-- ✅ Sidebar -->
<div class="sidebar">

    <h5 class="text-center mb-4">Menu</h5>

    <a href="{% url 'product_list' %}" class="{% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
        <i class="bi bi-list-ul"></i> Products
    </a>

    <a href="{% url 'product_create' %}">
        <i class="bi bi-plus-square"></i> Add Product
    </a>

    <a href="{% url 'issue_history' %}">
        <i class="bi bi-arrow-down-circle"></i> Issue History
    </a>

    <a href="{% url 'stock_alerts' %}">
        <i class="bi bi-exclamation-triangle"></i> Stock Alerts
    </a>

    <hr class="text-secondary">

    <h6 class="text-center">Reports</h6>

    <a href="{% url 'daily_issue_report' %}">
        <i class="bi bi-calendar-day"></i> Daily Issue
    </a>

    <a href="{% url 'daily_sales_report' %}">
        <i class="bi bi-cash-stack"></i> Daily Sales
    </a>

    <a href="{% url 'monthly_sales_report' %}">
        <i class="bi bi-calendar3"></i> Monthly Sales
    </a>

</div>
{% endif %}


<!-- ✅ Main Content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
